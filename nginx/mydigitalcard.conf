# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name mydigitalcard.app www.mydigitalcard.app;

    # Allow Let's Encrypt ACME challenge before cert exists
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name mydigitalcard.app www.mydigitalcard.app;

    ssl_certificate     /etc/letsencrypt/live/mydigitalcard.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mydigitalcard.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Larger buffer to handle Next.js headers / JWT cookies
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
