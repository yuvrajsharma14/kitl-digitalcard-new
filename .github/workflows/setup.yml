name: Initial Server Setup

# Run this ONCE to bootstrap a brand-new EC2 instance.
# Trigger manually from: GitHub → Actions → "Initial Server Setup" → Run workflow
#
# Prerequisites before running:
#   1. EC2 instance is running (Ubuntu 22.04, t3.small)
#   2. Security group allows ports 22 and 80
#   3. All required GitHub secrets are set (see list below)
#
# Required secrets:
#   AWS_ACCESS_KEY_ID         — IAM user (github-actions-deploy) access key
#   AWS_SECRET_ACCESS_KEY     — IAM user secret key
#   EC2_HOST                  — Elastic IP of the EC2 instance
#   EC2_SSH_KEY               — Full contents of the .pem key file
#   PROD_POSTGRES_PASSWORD    — Password for PostgreSQL
#   PROD_REDIS_PASSWORD       — Password for Redis
#   PROD_NEXTAUTH_SECRET      — Random secret (openssl rand -base64 32)
#
# Optional (app works without these):
#   PROD_GOOGLE_CLIENT_ID / PROD_GOOGLE_CLIENT_SECRET
#   PROD_CLOUDINARY_* / PROD_RESEND_API_KEY

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_WEB_REPO: mydigitalcard-web
  ECR_MIGRATE_REPO: mydigitalcard-migrate

jobs:
  # ─── 1. Create ECR repositories ───────────────────────────────────────────────
  create-ecr:
    name: Create ECR repositories
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repos (idempotent)
        run: |
          aws ecr describe-repositories --repository-names $ECR_WEB_REPO \
            --region $AWS_REGION 2>/dev/null \
            || aws ecr create-repository --repository-name $ECR_WEB_REPO --region $AWS_REGION

          aws ecr describe-repositories --repository-names $ECR_MIGRATE_REPO \
            --region $AWS_REGION 2>/dev/null \
            || aws ecr create-repository --repository-name $ECR_MIGRATE_REPO --region $AWS_REGION

          echo "✓ ECR repositories ready"
          aws ecr describe-repositories \
            --repository-names $ECR_WEB_REPO $ECR_MIGRATE_REPO \
            --query 'repositories[*].repositoryUri' --output table

  # ─── 2. Build & push Docker images ────────────────────────────────────────────
  build-and-push:
    name: Build & push images to ECR
    needs: create-ecr
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push web image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f apps/web/Dockerfile \
            -t $REGISTRY/$ECR_WEB_REPO:${{ github.sha }} \
            -t $REGISTRY/$ECR_WEB_REPO:latest \
            .
          docker push $REGISTRY/$ECR_WEB_REPO:${{ github.sha }}
          docker push $REGISTRY/$ECR_WEB_REPO:latest
          echo "✓ Web image pushed"

      - name: Build & push migrate image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f apps/web/Dockerfile.migrate \
            -t $REGISTRY/$ECR_MIGRATE_REPO:${{ github.sha }} \
            -t $REGISTRY/$ECR_MIGRATE_REPO:latest \
            .
          docker push $REGISTRY/$ECR_MIGRATE_REPO:${{ github.sha }}
          docker push $REGISTRY/$ECR_MIGRATE_REPO:latest
          echo "✓ Migrate image pushed"

  # ─── 3. Provision EC2 & start the app (HTTP, no SSL) ──────────────────────────
  provision-ec2:
    name: Provision EC2 & start app
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_OUTPUT

      # ── 3a. Install system packages ───────────────────────────────────────────
      - name: Install Docker, Nginx, AWS CLI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive

            sudo apt-get update -q
            sudo apt-get install -y -q awscli nginx

            if ! command -v docker &>/dev/null; then
              sudo apt-get install -y -q ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -q
              sudo apt-get install -y -q docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker ubuntu
              echo "✓ Docker installed"
            else
              echo "✓ Docker already installed"
            fi

            if ! swapon --show | grep -q /swapfile; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              echo "✓ Swap created"
            else
              echo "✓ Swap already exists"
            fi

      # ── 3b. Write .env.prod ───────────────────────────────────────────────────
      - name: Write .env.prod
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.PROD_REDIS_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.PROD_NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.PROD_CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.PROD_CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.PROD_CLOUDINARY_API_SECRET }}
          RESEND_API_KEY: ${{ secrets.PROD_RESEND_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,POSTGRES_PASSWORD,REDIS_PASSWORD,NEXTAUTH_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,RESEND_API_KEY
          script: |
            set -e
            sudo mkdir -p /opt/mydigitalcard
            sudo chown ubuntu:ubuntu /opt/mydigitalcard
            cd /opt/mydigitalcard

            # Derive the public IP from EC2 metadata
            PUBLIC_IP=$(curl -sf http://169.254.169.254/latest/meta-data/public-ipv4)
            echo "Public IP: $PUBLIC_IP"

            cat > .env.prod << EOF
            POSTGRES_USER=mdc_user
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            ECR_REGISTRY=${ECR_REGISTRY}
            NEXTAUTH_URL=http://${PUBLIC_IP}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            AUTH_SECRET=${NEXTAUTH_SECRET}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
            RESEND_API_KEY=${RESEND_API_KEY}
            EOF

            chmod 600 .env.prod
            echo "✓ .env.prod written (NEXTAUTH_URL=http://$PUBLIC_IP)"

      # ── 3c. Copy project files ────────────────────────────────────────────────
      - name: Copy docker-compose.prod.yml and nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/mydigitalcard.conf"
          target: /opt/mydigitalcard/

      # ── 3d. Configure Nginx (HTTP only) ───────────────────────────────────────
      - name: Configure Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            PUBLIC_IP=$(curl -sf http://169.254.169.254/latest/meta-data/public-ipv4)

            sudo tee /etc/nginx/sites-available/mydigitalcard.conf > /dev/null << NGINXEOF
            server {
                listen 80;
                server_name $PUBLIC_IP _;

                proxy_buffer_size       128k;
                proxy_buffers           4 256k;
                proxy_busy_buffers_size 256k;
                client_max_body_size    10M;

                location / {
                    proxy_pass         http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade \$http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host \$host;
                    proxy_set_header   X-Real-IP \$remote_addr;
                    proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 60s;
                }
            }
            NGINXEOF

            sudo ln -sf /etc/nginx/sites-available/mydigitalcard.conf \
              /etc/nginx/sites-enabled/mydigitalcard.conf
            sudo rm -f /etc/nginx/sites-enabled/default

            sudo nginx -t && sudo systemctl reload nginx
            echo "✓ Nginx configured for http://$PUBLIC_IP"

      # ── 3e. Pull images, migrate, start app ───────────────────────────────────
      - name: Pull images, run migration, start app
        uses: appleboy/ssh-action@v1
        env:
          AWS_REGION_VAR: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION_VAR,ECR_REGISTRY
          script: |
            set -e
            cd /opt/mydigitalcard

            echo "── Logging in to ECR ──"
            aws ecr get-login-password --region $AWS_REGION_VAR | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "── Pulling images ──"
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "── Starting postgres and redis ──"
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d postgres redis

            echo "── Waiting for postgres to be healthy ──"
            for i in $(seq 1 30); do
              docker exec mdc_postgres pg_isready -U mdc_user && break
              echo "  waiting... ($i/30)"
              sleep 3
            done

            echo "── Running database migration ──"
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              run --rm migrate

            echo "── Starting web app ──"
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d web

            echo "── Waiting for app to be ready ──"
            sleep 15
            curl -sf http://127.0.0.1:3000/ > /dev/null \
              && echo "✓ App is responding" \
              || (docker compose -f docker-compose.prod.yml logs --tail=50 web && exit 1)

            PUBLIC_IP=$(curl -sf http://169.254.169.254/latest/meta-data/public-ipv4)
            echo ""
            echo "════════════════════════════════════════"
            echo "  Setup complete!"
            echo "  App running at: http://$PUBLIC_IP"
            echo "════════════════════════════════════════"
            docker compose -f docker-compose.prod.yml ps
